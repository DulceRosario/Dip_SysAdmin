<!-- tile-inspector.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Tile Inspector</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css"/>
  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #0f172a; color: #e2e8f0; }
    #map { height: 100vh; width: 100%; }

    #panel {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; padding: 12px; width: 280px;
    }
    #panel h2 { font-size: 12px; color: #38bdf8; margin-bottom: 10px; letter-spacing: 1px; }
    label { font-size: 11px; color: #94a3b8; display: block; margin-top: 8px; }
    input, select {
      width: 100%; background: #0f172a; border: 1px solid #334155;
      color: #e2e8f0; border-radius: 4px; padding: 5px 8px;
      font-size: 11px; margin-top: 3px; font-family: monospace;
    }
    button {
      margin-top: 10px; width: 100%; background: #0369a1;
      color: white; border: none; border-radius: 4px;
      padding: 7px; font-size: 12px; cursor: pointer;
    }
    button:hover { background: #0284c7; }

    #info {
      position: absolute; bottom: 12px; left: 12px; z-index: 10;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; padding: 10px 12px;
      font-size: 11px; max-width: 320px; display: none;
    }
    #info h3 { color: #38bdf8; margin-bottom: 6px; }
    #info table { width: 100%; border-collapse: collapse; }
    #info td { padding: 2px 6px; }
    #info td:first-child { color: #94a3b8; }
    #info td:last-child { color: #e2e8f0; }

    #status {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; padding: 8px 12px; font-size: 11px;
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .ok  { background: #22c55e; }
    .err { background: #ef4444; }
    .loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Panel de control -->
<div id="panel">
  <h2>⬡ TILE INSPECTOR</h2>

  <label>URL base del servicio</label>
  <input id="baseUrl" value="https://atlas.atmosfera.unam.mx/tiles"/>

  <label>Fecha (dejar vacío = última)</label>
  <select id="fechaSelect"><option value="">Cargando...</option></select>

  <label>Source layer (nombre en tippecanoe)</label>
  <input id="sourceLayer" value="inundaciones"/>

  <label>Propiedad de color</label>
  <input id="colorProp" value="depth_m"/>

  <button onclick="loadTiles()">▶ Cargar tiles</button>
  <button onclick="fetchEstructura()" style="background:#1e3a5f;margin-top:4px">↻ Refrescar fechas</button>
</div>

<!-- Status -->
<div id="status">
  <span class="dot loading" id="dot"></span>
  <span id="statusText">Conectando...</span>
</div>

<!-- Info popup -->
<div id="info">
  <h3>Feature info</h3>
  <table id="infoTable"></table>
</div>

<script>
  const map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        carto: {
          type: 'raster',
          tiles: ['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'],
          tileSize: 256,
        }
      },
      layers: [{ id: 'base', type: 'raster', source: 'carto' }]
    },
    center: [-99.1332, 19.4326],
    zoom: 11,
  });

  function setStatus(ok, msg) {
    document.getElementById('dot').className = `dot ${ok ? 'ok' : 'err'}`;
    document.getElementById('statusText').textContent = msg;
  }

  async function fetchEstructura() {
    const base = document.getElementById('baseUrl').value.trim();
    try {
      const data = await fetch(`${base}/estructura`).then(r => r.json());
      const fechas = Object.values(data.estructura).flat().reverse();
      const sel = document.getElementById('fechaSelect');
      sel.innerHTML = fechas.map(f =>
        `<option value="${f}" ${f === data.ultima_fecha ? 'selected' : ''}>${f}</option>`
      ).join('');
      setStatus(true, `${fechas.length} fechas disponibles`);
    } catch (e) {
      setStatus(false, 'Error al conectar con el servicio');
    }
  }

  function loadTiles() {
    const base    = document.getElementById('baseUrl').value.trim();
    const fecha   = document.getElementById('fechaSelect').value;
    const layer   = document.getElementById('sourceLayer').value.trim();
    const prop    = document.getElementById('colorProp').value.trim();
    const tileUrl = `${base}/{z}/{x}/{y}.pbf${fecha ? '?fecha=' + fecha : ''}`;

    document.getElementById('dot').className = 'dot loading';
    document.getElementById('statusText').textContent = 'Cargando tiles...';

    // Limpiar capas anteriores
    ['flood-fill', 'flood-line'].forEach(id => {
      if (map.getLayer(id)) map.removeLayer(id);
    });
    if (map.getSource('inundaciones')) map.removeSource('inundaciones');

    map.addSource('inundaciones', {
      type: 'vector',
      tiles: [tileUrl],
      minzoom: 10,
      maxzoom: 16,
    });

    map.addLayer({
      id: 'flood-fill',
      type: 'fill',
      source: 'inundaciones',
      'source-layer': layer,
      paint: {
        'fill-color': [
          'interpolate', ['linear'], ['get', prop],
          0,   '#e0f3db',
          0.1, '#a8ddb5',
          0.3, '#7bccc4',
          0.5, '#43a2ca',
          1.0, '#0868ac',
        ],
        'fill-opacity': 0.7,
      },
    });

    map.addLayer({
      id: 'flood-line',
      type: 'line',
      source: 'inundaciones',
      'source-layer': layer,
      paint: { 'line-color': '#0369a1', 'line-width': 0.5, 'line-opacity': 0.4 },
    });

    // Click → info
    map.on('click', 'flood-fill', (e) => {
      const props = e.features[0].properties;
      const table = Object.entries(props)
        .map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`)
        .join('');
      document.getElementById('infoTable').innerHTML = table;
      document.getElementById('info').style.display = 'block';
    });

    map.on('mouseenter', 'flood-fill', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'flood-fill', () => map.getCanvas().style.cursor = '');

    // Detectar si los tiles cargan bien
    map.getSource('inundaciones').on('data', (e) => {
      if (e.isSourceLoaded) setStatus(true, `Tiles cargados · ${fecha || 'última fecha'}`);
    });

    setTimeout(() => {
      if (document.getElementById('dot').classList.contains('loading'))
        setStatus(false, 'Timeout — verifica la URL y CORS');
    }, 30000);
  }

  // Inicializar
  map.on('load', () => fetchEstructura().then(loadTiles));
</script>
</body>
</html>
